<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Data Explorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        h1 {
            margin-top: 20px;
        }

        #dataContainer {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        #dataContainer div {
            background-color: white;
            margin: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            width: 250px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        input, select, button {
            margin: 10px;
            padding: 8px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        button {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .news-container, .common-names {
            margin-top: 20px;
        }

        .news-container, .common-names {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <h1>Global Data Explorer</h1>

    <label>Sort by:
        <select id="sortField">
            <option value="name">Name</option>
            <option value="population">Population</option>
            <option value="area">Area</option>
            <option value="region">Region</option>
        </select>
    </label>

    <label>Filter by keyword:
        <input type="text" id="filterKeyword" placeholder="Type country or region">
    </label>

    <button id="loadBtn">Load Countries</button>

    <div id="dataContainer"></div>

    <div id="newsContainer" class="news-container"></div>
    <div id="commonNamesContainer" class="common-names"></div>

    <script>
        document.getElementById("loadBtn").addEventListener("click", loadCountries);

        async function loadCountries() {
            const sortField = document.getElementById("sortField").value;
            const filterKeyword = document.getElementById("filterKeyword").value.toLowerCase();

            try {
                const response = await fetch("https://restcountries.com/v3.1/all");
                let data = await response.json();

                if (filterKeyword) {
                    data = data.filter(country =>
                        country.name.common.toLowerCase().includes(filterKeyword) ||
                        (country.region && country.region.toLowerCase().includes(filterKeyword))
                    );
                }

                data.sort((a, b) => {
                    if (sortField === "name") return a.name.common.localeCompare(b.name.common);
                    if (sortField === "population") return b.population - a.population;
                    if (sortField === "area") return (b.area || 0) - (a.area || 0);
                    if (sortField === "region") return a.region.localeCompare(b.region);
                });

                const container = document.getElementById("dataContainer");
                container.innerHTML = "";
                data.forEach(country => {
                    const div = document.createElement("div");
                    div.innerHTML = `
                        <strong>${country.name.common}</strong><br>
                        Population: ${country.population}<br>
                        Area: ${country.area || "N/A"} km²<br>
                        Region: ${country.region}<br>
                        <img src="${country.flags.png}" alt="Flag" width="50px"><br>
                    `;
                    container.appendChild(div);
                });

                fetchNews('global');
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        async function fetchNews(query) {
            const newsApiKey = 'YOUR_NEWS_API_KEY';
            const url = `https://newsapi.org/v2/top-headlines?q=${query}&apiKey=${newsApiKey}`;
            try {
                const response = await fetch(url);
                const newsData = await response.json();
                const newsContainer = document.getElementById("newsContainer");
                newsContainer.innerHTML = '<h3>Latest News:</h3>';
                newsData.articles.forEach(article => {
                    const newsDiv = document.createElement("div");
                    newsDiv.innerHTML = `
                        <h4>${article.title}</h4>
                        <p>${article.description}</p>
                        <a href="${article.url}" target="_blank">Read more</a>
                    `;
                    newsContainer.appendChild(newsDiv);
                });
            } catch (error) {
                console.error("Error fetching news:", error);
            }
        }

        function fetchCommonNames() {
            const names = [
                "James", "Mary", "John", "Patricia", "Michael", "Jennifer", "David", "Linda"
            ];
            const commonNamesContainer = document.getElementById("commonNamesContainer");
            commonNamesContainer.innerHTML = '<h3>Common Names:</h3>';
            names.forEach(name => {
                const nameDiv = document.createElement("div");
                nameDiv.textContent = name;
                commonNamesContainer.appendChild(nameDiv);
            });
        }

        function fetchNumberFacts() {
            const factsContainer = document.getElementById("numberFactsContainer");
            factsContainer.innerHTML = "<h3>Interesting Facts about Numbers:</h3>";
            factsContainer.innerHTML += `
                <p>The population of China is approximately 1.4 billion.</p>
                <p>The area of Russia is about 17.1 million square kilometers.</p>
                <p>There are 195 countries in the world today.</p>
            `;
        }

    </script>

</body>
</html>
