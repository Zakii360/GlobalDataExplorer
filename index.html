<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Data Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            width: 100%;
            max-width: 1200px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
            color: #333;
        }

        label, button {
            font-size: 1rem;
            margin-right: 10px;
        }

        input, select, button {
            padding: 10px;
            font-size: 1rem;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        button {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .filters {
            margin-bottom: 20px;
        }

        .country-cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .country-card {
            background-color: #fafafa;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            margin: 15px;
            padding: 20px;
            width: 280px;
            text-align: left;
            box-sizing: border-box;
            transition: transform 0.3s ease-in-out;
        }

        .country-card:hover {
            transform: translateY(-5px);
        }

        .country-card img {
            width: 60px;
            height: auto;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .common-names-container {
            margin-top: 40px;
        }

        .common-names-container h3 {
            margin-bottom: 15px;
        }

        .common-names-container div {
            margin: 5px;
            font-size: 1.1rem;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Global Data Explorer</h1>

        <div class="filters">
            <label for="sortField">Sort by:</label>
            <select id="sortField">
                <option value="name">Name</option>
                <option value="population">Population</option>
                <option value="area">Area</option>
                <option value="region">Region</option>
            </select>

            <label for="filterKeyword">Filter by keyword:</label>
            <input type="text" id="filterKeyword" placeholder="Search for a country">

            <button id="loadBtn">Load Countries</button>
        </div>

        <div id="dataContainer" class="country-cards"></div>
        
        <div id="commonNamesContainer" class="common-names-container"></div>
    </div>

    <script>
        document.getElementById("loadBtn").addEventListener("click", loadCountries);

        async function loadCountries() {
            const sortField = document.getElementById("sortField").value;
            const filterKeyword = document.getElementById("filterKeyword").value.toLowerCase();

            try {
                const response = await fetch("https://restcountries.com/v3.1/all");
                let data = await response.json();

                if (filterKeyword) {
                    data = data.filter(country =>
                        country.name.common.toLowerCase().includes(filterKeyword) ||
                        (country.region && country.region.toLowerCase().includes(filterKeyword))
                    );
                }

                data.sort((a, b) => {
                    if (sortField === "name") return a.name.common.localeCompare(b.name.common);
                    if (sortField === "population") return b.population - a.population;
                    if (sortField === "area") return (b.area || 0) - (a.area || 0);
                    if (sortField === "region") return a.region.localeCompare(b.region);
                });

                const container = document.getElementById("dataContainer");
                container.innerHTML = "";
                data.forEach(country => {
                    const div = document.createElement("div");
                    div.classList.add("country-card");
                    div.innerHTML = `
                        <img src="${country.flags.png}" alt="Flag">
                        <strong>${country.name.common}</strong><br>
                        Population: ${country.population}<br>
                        Area: ${country.area || "N/A"} km²<br>
                        Region: ${country.region}
                    `;
                    container.appendChild(div);
                });

                fetchCommonNames();

            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        function fetchCommonNames() {
            const names = [
                "James", "Mary", "John", "Patricia", "Michael", "Jennifer", "David", "Linda"
            ];
            const commonNamesContainer = document.getElementById("commonNamesContainer");
            commonNamesContainer.innerHTML = '<h3>Common Names:</h3>';
            names.forEach(name => {
                const nameDiv = document.createElement("div");
                nameDiv.textContent = name;
                commonNamesContainer.appendChild(nameDiv);
            });
        }
    </script>

</body>
</html>
